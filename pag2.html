<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Página 2</title>

<style>

body{
margin:0;
background:#ffffff;
opacity:0;
transition:opacity .35s ease;
}

body.loaded{
opacity:1;
}

body.fade-out{
opacity:0;
}

img{
width:100vw;
display:block;
cursor:pointer;
}

</style>

</head>

<body>

<img src="pag2ed.png" onclick="navigate('pag3.html')">

<script>

window.onload=()=>document.body.classList.add("loaded");

function navigate(page){

document.body.classList.add("fade-out");

setTimeout(()=>{

window.location.href=page;

},350)

}

</script>

</body>

</html>
