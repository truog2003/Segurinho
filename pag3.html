<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Ameaça</title>

<style>

html, body{
margin:0;
padding:0;
background:#fff;
overflow-x:hidden;
}

body{
opacity:1;
transition:opacity .2s ease-out;
}

body.fade-out{
opacity:0;
}

img{
width:100%;
height:auto;
display:block;
cursor:pointer;
}

</style>

</head>

<body>

<img src="pag3ed.png" onclick="navigate('pag4.html')">

<script>

function navigate(page){

document.body.classList.add("fade-out");

setTimeout(()=>{
window.location.href = page;
},200);

}

</script>

</body>

</html>
